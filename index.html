            font-size: 1.4em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            letter-spacing: 3px;
        }
        .btn-draw:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.5);
        }
        .btn-draw:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .query-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .query-area input {
            padding: 10px 15px;
            border: 2px solid #8b6914;
            border-radius: 25px;
            font-size: 1em;
            width: 140px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);

        }
        .query-area input:focus {
            border-color: #5c1a1a;
        }
        .btn-query {
            background: #5c1a1a;
            color: #ffd700;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        .btn-query:hover {
            background: #7a1a1a;
            transform: scale(1.05);
        }
        .result-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .sign-card {
            background: #fff8f0;
            border: 2px solid #8b6914;
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
        }
        .sign-header {
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 2px dashed #8b6914;
        }
        .sign-number {
            font-size: 1.6em;
            color: #5c1a1a;
            font-weight: bold;
        }
        .sign-title {
            font-size: 1.3em;
            color: #2a1a0a;
            margin: 5px 0;
        }
        .sign-luck {
            display: inline-block;
            padding: 4px 20px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: bold;
        }
        .luck-大吉,

            color: #5c1a1a;
        }
        .luck-上吉 {
            background: #ff6b35;
            color: #fff;
        }
        .luck-中吉 {

            color: #fff;
        }

            background: #95a5a6;
            color: #fff;
        }
        .luck-下下 {
            background: #2c3e50;
            color: #fff;
        }

            color: #fff;
        }

            background: rgba(139, 105, 20, 0.1);

            border-radius: 10px;
            margin: 12px 0;
            border-left: 4px solid #8b6914;
        }

            color: #5c1a1a;
        }
        .sign-poem {
            text-align: center;
            font-size: 1.05em;
            color: #5c1a1a;
            padding: 10px;
            background: rgba(139, 105, 20, 0.08);
            border-radius: 10px;
            margin: 10px 0;
            line-height: 1.8;
        }
        .sign-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }
        .sign-detail-item {
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #d4c5a9;
            font-size: 0.92em;
        }
        .sign-detail-item .label {
            font-weight: bold;
            color: #5c1a1a;
            display: block;
            font-size: 0.85em;
        }
        .sign-footer {
            text-align: center;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 2px dashed #8b6914;
            color: #7a4a3a;
            font-style: italic;
        }
        .history-area {

            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        .history-area h3 {
            color: #5c1a1a;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        .history-item {

        }

            margin-top: 12px;
            color: #7a4a3a;
            font-size: 0.75em;
        }

            .container {

                font-size: 1.6em;
                letter-spacing: 4px;
            }
            .btn-draw {
                padding: 14px 30px;
                font-size: 1.1em;
            }

                grid-template-columns: 1fr;
            }
            .query-area input {
                width: 110px;
            }
        }
    </style>
</head>

            "梁灏八十中状元", "韩信受胯下之辱", "诸葛亮出山", "李密挂角读书", "孟尝君被囚",
            "管鲍分金", "杨震暮夜却金", "范雎逃秦", "大舜耕历山", "严子陵钓富春",
            "赵子龙救阿斗", "孔子在陈绝粮", "刘备败走白帝城", "李白醉写蛮书", "张骞泛槎",
            "秦桧害岳飞", "曹彬下江南", "薛仁贵投军", "范增辞朝", "唐明皇游月宫"
        ];

        for (let i = 11; i <= 100; i++) {
            if (!SIGNS[i]) {
                const idx = (i - 11) % titles.length;
                const lidx = i % luckCycle.length;
                const luck = luckCycle[lidx] || "中平";
                SIGNS[i] = {
                    "签号": `第${i}签`,
                    "签题": titles[idx] || `签文${i}`,
                    "吉凶": luck,
                    "典故": "历史典故",
                    "解析": {
                        "总判": "时运有轮回，天道自酬勤。",
                        "功名": "努力不懈，终有成就。",
                        "婚姻": "良缘需待，不可强求。",
                        "求财": "财运渐来，守正为要。",
                        "疾病": "调养有方，康复可期。",
                        "诉讼": "以和为贵，息事宁人。",
                        "行人": "归期将至，耐心等待。",
                        "年成": "收成中上，可望丰收。",
                        "求嗣": "诚心祈福，可得佳儿。",
                        "移居": "迁居有利，择吉而行。",
                        "失物": "耐心寻找，或可寻回。",
                        "出行": "出行顺利，遇贵提携。",
                        "家宅": "家运平稳，福泽绵长。"
                    }
                };
            }
        }

        // ----- 功能代码 -----
        let history = JSON.parse(localStorage.getItem('guandi_history') || '[]');

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<div style="color:#7a4a3a;font-size:0.85em;">暂无记录 🙏</div>';
                return;
            }
            list.innerHTML = history.slice(-10).reverse().map(h =>
                `<div class="history-item">
                    <span class="h-sign">${h.sign}</span>
                    <span>《${h.title}》</span>
                    <span style="color:#7a4a3a;font-size:0.75em;">${h.time}</span>
                </div>`
            ).join('');
        }

        function drawSign() {
            const btn = document.getElementById('btnText');
            const container = document.getElementById('resultContainer');
            const card = document.getElementById('signCard');

            btn.textContent = '🙏 求签中...';
            btn.parentElement.disabled = true;

            setTimeout(() => {
                const num = Math.floor(Math.random() * 100) + 1;
                const sign = SIGNS[num.toString()];
                if (!sign) {
                    card.innerHTML = '<p style="color:red;">❌ 抽签失败</p>';
                    container.style.display = 'block';
                    btn.textContent = '🎯 诚心求签';
                    btn.parentElement.disabled = false;
                    return;
                }

                const now = new Date();
                history.push({
                    sign: sign.签号,
                    title: sign.签题,
                    time: now.toLocaleString('zh-CN')
                });
                localStorage.setItem('guandi_history', JSON.stringify(history));
                renderHistory();

                const luckClass = sign.吉凶.replace(/[^\w\u4e00-\u9fff]/g, '');
                let detailsHTML = '';
                const exclude = ['总判'];
                for (const [key, value] of Object.entries(sign.解析)) {
                    if (exclude.includes(key)) continue;
                    detailsHTML +=
                        `<div class="sign-detail-item"><span class="label">${key}</span>${value}</div>`;
                }

                card.innerHTML = `
                    <div class="sign-header">
                        <div class="sign-number">${sign.签号}</div>
                        <div class="sign-title">📜 ${sign.签题}</div>
                        <span class="sign-luck luck-${luckClass}">${sign.吉凶}</span>
                    </div>
                    ${sign.典故 ? `<div class="sign-story"><strong>📖 典故：</strong>${sign.典故}</div>` : ''}
                    <div class="sign-poem">${sign.解析.总判 || ''}</div>
                    <div class="sign-details">${detailsHTML}</div>
                    <div class="sign-footer">🙏 关帝圣君保佑 · 心诚则灵</div>
                `;
                container.style.display = 'block';
                container.scrollIntoView({ behavior: 'smooth', block: 'center' });

                btn.textContent = '🎯 再求一签';
                btn.parentElement.disabled = false;
            }, 700);
        }

        function querySign() {
            const input = document.getElementById('signInput');
            const num = input.value.trim();
            if (!num || num < 1 || num > 100) {
                alert('请输入 1-100 的签号');
                return;
            }
            const sign = SIGNS[num];
            const container = document.getElementById('resultContainer');
            const card = document.getElementById('signCard');
            if (!sign) {
                card.innerHTML = `<p style="color:red;">❌ 未找到第${num}签</p>`;
                container.style.display = 'block';
                return;
            }
            const luckClass = sign.吉凶.replace(/[^\w\u4e00-\u9fff]/g, '');
            let detailsHTML = '';
            const exclude = ['总判'];
            for (const [key, value] of Object.entries(sign.解析)) {
                if (exclude.includes(key)) continue;
                detailsHTML +=
                    `<div class="sign-detail-item"><span class="label">${key}</span>${value}</div>`;
            }
            card.innerHTML = `
                <div class="sign-header">
                    <div class="sign-number">${sign.签号}</div>
                    <div class="sign-title">📜 ${sign.签题}</div>
                    <span class="sign-luck luck-${luckClass}">${sign.吉凶}</span>
                </div>
                ${sign.典故 ? `<div class="sign-story"><strong>📖 典故：</strong>${sign.典故}</div>` : ''}
                <div class="sign-poem">${sign.解析.总判 || ''}</div>
                <div class="sign-details">${detailsHTML}</div>
                <div class="sign-footer">🙏 关帝圣君保佑 · 心诚则灵</div>
            `;
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.getElementById('signInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') querySign();
        });

        renderHistory();
    </script>

</body>
</html>
